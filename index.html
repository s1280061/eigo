<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b4f8a">
<title>IELTS 弱点改善ノート</title>
<style>
  :root{
    --bg:#0e1621; --card:#17222f; --card2:#1e2b3a; --ink:#e8eef5; --sub:#93a4b5;
    --brand:#3d9bff; --bad:#ff6b6b; --good:#4ade80; --line:#26364a; --accent:#ffcf5c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Hiragino Sans","Yu Gothic","Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
    max-width:640px; margin:0 auto;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg,#0b4f8a,#0a3f70);
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    box-shadow:0 2px 12px rgba(0,0,0,.4);
  }
  header h1{margin:0; font-size:17px; letter-spacing:.5px;}
  header .goal{font-size:12px; color:#cfe4ff; margin-top:2px;}
  header .prog{margin-top:8px; height:6px; background:rgba(255,255,255,.2); border-radius:99px; overflow:hidden;}
  header .prog i{display:block; height:100%; width:0; background:var(--accent); transition:width .4s;}
  header .progtxt{font-size:11px; color:#cfe4ff; margin-top:4px;}
  main{padding:14px;}
  .view{display:none; animation:fade .25s;}
  .view.on{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  /* Home */
  .lead{background:var(--card); border-left:4px solid var(--brand); border-radius:12px; padding:14px 16px; font-size:14px;}
  .lead b{color:var(--accent);}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0;}
  .chip{background:var(--card2); border:1px solid var(--line); border-radius:99px; padding:8px 14px; font-size:13px; color:var(--sub);}
  .chip b{color:var(--ink);}
  .quick{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;}
  .quick button{
    background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:14px; padding:18px 12px; font-size:15px; font-weight:700; text-align:left; cursor:pointer;
  }
  .quick button span{display:block; font-size:12px; font-weight:400; color:var(--sub); margin-top:4px;}
  .quick button:active{transform:scale(.97);}

  /* Category filter */
  .filter{display:flex; gap:7px; overflow-x:auto; padding:2px 0 10px; scrollbar-width:none;}
  .filter::-webkit-scrollbar{display:none;}
  .filter button{
    flex:0 0 auto; background:var(--card2); border:1px solid var(--line); color:var(--sub);
    border-radius:99px; padding:7px 14px; font-size:13px; cursor:pointer; white-space:nowrap;
  }
  .filter button.on{background:var(--brand); color:#02121f; border-color:var(--brand); font-weight:700;}

  /* Mistake card */
  .mcard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 15px; margin-bottom:12px;}
  .mcard .mid{font-size:11px; font-weight:700; color:var(--brand);}
  .mcard .ctopic{font-size:12px; color:var(--accent); font-weight:700; margin-top:8px;}
  .mcard .cctx{font-size:12.5px; color:var(--ink); background:var(--card2); border-radius:9px; padding:8px 10px; margin:5px 0 2px; line-height:1.5;}
  .mcard .catlab{float:right; font-size:11px; color:var(--sub); background:var(--card2); padding:2px 8px; border-radius:99px;}
  .mcard .bad{color:var(--bad); font-family:ui-monospace,Consolas,monospace; margin:8px 0 4px; font-size:14px;}
  .mcard .arrow{color:var(--sub); font-size:12px;}
  .mcard .good{color:var(--good); font-family:ui-monospace,Consolas,monospace; font-size:14px; font-weight:600;}
  .mcard .detail{max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .mcard.open .detail{max-height:400px;}
  .mcard .why{font-size:13px; color:var(--ink); margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .mcard .ex{font-size:13px; color:var(--sub); margin-top:6px; font-style:italic;}
  .mcard .tap{font-size:11px; color:var(--sub); margin-top:8px;}

  /* Quiz */
  .quizwrap{text-align:center;}
  .qcount{font-size:12px; color:var(--sub); margin-bottom:6px;}
  .qcard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px 18px; min-height:180px;}
  .qcat{font-size:11px; color:var(--brand); font-weight:700;}
  .qtopic{font-size:12px; color:var(--accent); font-weight:700; margin-top:10px;}
  .qctx{font-size:13px; color:var(--ink); background:var(--card2); border-radius:10px; padding:10px 12px; margin:8px 0 4px; text-align:left; line-height:1.55;}
  .qbad{color:var(--bad); font-family:ui-monospace,Consolas,monospace; font-size:17px; margin:14px 0;}
  .qhint{font-size:12px; color:var(--sub);}
  .qans{margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); display:none;}
  .qans.show{display:block;}
  .qgood{color:var(--good); font-family:ui-monospace,Consolas,monospace; font-size:17px; font-weight:600;}
  .qwhy{font-size:13px; color:var(--ink); margin-top:10px; text-align:left;}
  .qex{font-size:13px; color:var(--sub); font-style:italic; margin-top:6px; text-align:left;}
  .qbtns{display:flex; gap:10px; margin-top:16px;}
  .qbtns button{flex:1; border:none; border-radius:12px; padding:15px; font-size:15px; font-weight:700; cursor:pointer;}
  .breveal{background:var(--brand); color:#02121f;}
  .bhard{background:#3a2530; color:var(--bad); border:1px solid var(--bad)!important;}
  .beasy{background:#1e3327; color:var(--good); border:1px solid var(--good)!important;}
  .done{background:var(--card); border-radius:16px; padding:30px 18px; text-align:center;}
  .done h2{color:var(--good); margin:0 0 8px;}

  /* Tables (top5, week, priority) */
  .sec h2{font-size:16px; color:var(--brand); margin:4px 0 12px;}
  .row5{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;}
  .row5 .rk{display:inline-block; background:var(--brand); color:#02121f; font-weight:800; border-radius:8px; padding:1px 9px; font-size:13px;}
  .row5 .t{font-weight:700; margin-left:8px;}
  .row5 .sym{font-size:12px; color:var(--sub); margin:6px 0; font-family:ui-monospace,monospace;}
  .row5 .fx{font-size:13px; color:var(--good);}
  .day{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; display:flex; gap:12px;}
  .day .d{flex:0 0 34px; height:34px; border-radius:50%; background:var(--brand); color:#02121f; font-weight:800; display:flex; align-items:center; justify-content:center;}
  .day .th{font-weight:700;} .day .ts{font-size:12px; color:var(--sub); margin-top:2px;}
  .pr{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;}
  .pr h3{margin:0 0 6px; font-size:15px;}
  .pr .pd{font-size:12px; color:var(--sub); font-weight:400;}
  .pr ul{margin:0; padding-left:18px; font-size:13px;}
  .es{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px;}
  .es h3{margin:0 0 6px; font-size:14px; color:var(--accent);}
  .es p{margin:0; font-size:13px; color:var(--ink);}
  .es .ewords{font-size:11px; color:var(--sub); font-weight:400;}
  .eprompt{font-size:12px; color:var(--sub); background:var(--card2); border-radius:8px; padding:7px 10px; margin-bottom:8px;}
  .etoggle{font-size:12px; color:var(--brand); cursor:pointer; margin:2px 0 8px; user-select:none;}
  .eblock{font-size:13px; line-height:1.65; border-radius:9px; padding:10px 12px; margin-bottom:8px;}
  .etag{display:inline-block; font-size:11px; font-weight:700; border-radius:6px; padding:1px 7px; margin-right:6px;}
  .etag.bad{background:#3a2530; color:var(--bad);} .etag.good{background:#1e3327; color:var(--good);} .etag.imp{background:#2a2440; color:#c084fc;}
  .eblock.eorig{background:rgba(255,107,107,.07); color:var(--sub);}
  .eblock.enat{background:rgba(74,222,128,.07); color:var(--ink);}
  .eblock.eimp{background:rgba(192,132,252,.08); color:var(--ink);}
  .note{font-size:12px; color:var(--sub); text-align:center; margin:14px 0;}

  /* Bottom nav */
  nav{
    position:fixed; bottom:0; left:0; right:0; max-width:640px; margin:0 auto;
    background:rgba(14,22,33,.96); backdrop-filter:blur(10px); border-top:1px solid var(--line);
    display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  nav button{flex:1; background:none; border:none; color:var(--sub); font-size:10px; padding:6px 2px; cursor:pointer;}
  nav button .ic{font-size:20px; display:block;}
  nav button.on{color:var(--brand);}
</style>
</head>
<body>
<header>
  <h1>IELTS 弱点改善ノート</h1>
  <div class="goal" id="goal"></div>
  <div class="prog"><i id="progbar"></i></div>
  <div class="progtxt" id="progtxt">学習の進捗</div>
</header>

<main>
  <!-- HOME -->
  <section class="view on" id="v-home">
    <div class="lead">あなたのアイデア・構成はすでに <b>Band 7 級</b>。負けているのは<b>「文法の正確さ」だけ</b>です。通勤中はこのアプリでミスを1枚ずつ潰しましょう。</div>
    <div class="chips" id="homechips"></div>
    <div class="quick">
      <button onclick="go('cards')">📇 カードで復習<span id="qc-cards"></span></button>
      <button onclick="startQuiz()">⚡ クイズに挑戦<span>❌を見て✅を当てる</span></button>
      <button onclick="go('models')">📖 模範解答<span>Before→自然→改良</span></button>
      <button onclick="go('top5')">🎯 苦手TOP5<span>最優先の弱点</span></button>
      <button onclick="go('plan')">📅 練習メニュー<span>1週間＋優先順位</span></button>
    </div>
    <button id="weakbtn" onclick="startQuiz(true)" style="display:none;width:100%;margin-top:12px;background:#3a2530;border:1px solid var(--bad);color:var(--bad);border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;">⚠️ 苦手だけ復習（<span id="weakbtn-n"></span>）</button>
    <div class="note">スマホのホーム画面に追加すると、アプリのように起動できます。進捗・苦手はこの端末に保存されます。</div>
  </section>

  <!-- CARDS -->
  <section class="view" id="v-cards">
    <div class="filter" id="catfilter"></div>
    <div id="cardlist"></div>
  </section>

  <!-- QUIZ -->
  <section class="view" id="v-quiz">
    <div class="quizwrap" id="quizwrap"></div>
  </section>

  <!-- TOP5 -->
  <section class="view sec" id="v-top5">
    <h2>特に苦手なポイント TOP5</h2>
    <div id="top5list"></div>
  </section>

  <!-- PLAN -->
  <section class="view sec" id="v-plan">
    <h2>1週間 練習メニュー</h2>
    <div class="note" style="text-align:left;margin:0 0 10px;">1日30〜40分：①インプット10分 → ②書く15分 → ③自己添削10分</div>
    <div id="weeklist"></div>
    <h2 style="margin-top:22px;">Band 6.5 優先順位</h2>
    <div id="priolist"></div>
  </section>

  <!-- MODELS -->
  <section class="view sec" id="v-models">
    <h2>模範解答（6設問）</h2>
    <div class="note" style="text-align:left;margin:0 0 10px;">各設問を「① あなたの原文 → ② 自然な表現 → ③ 改良版」で比較。タップで原文の開閉。</div>
    <div id="modellist"></div>
  </section>
</main>

<nav id="nav">
  <button data-v="home" class="on" onclick="go('home')"><span class="ic">🏠</span>ホーム</button>
  <button data-v="cards" onclick="go('cards')"><span class="ic">📇</span>カード</button>
  <button data-v="quiz" onclick="go('quiz')"><span class="ic">⚡</span>クイズ</button>
  <button data-v="models" onclick="go('models')"><span class="ic">📖</span>模範</button>
  <button data-v="top5" onclick="go('top5')"><span class="ic">🎯</span>TOP5</button>
  <button data-v="plan" onclick="go('plan')"><span class="ic">📅</span>練習</button>
</nav>

<script src="data.js"></script>
<script>
const D = window.IELTS_DATA;
const cats = ["品詞","前置詞","冠詞","コロケーション","文構造"];
const catColor = {"品詞":"#3d9bff","前置詞":"#ffcf5c","冠詞":"#4ade80","コロケーション":"#ff8fab","文構造":"#c084fc"};
const LS = "ielts_note_progress_v1";
const LSW = "ielts_note_weak_v1";
let learned = JSON.parse(localStorage.getItem(LS) || "{}");
let weak = JSON.parse(localStorage.getItem(LSW) || "{}");
function save(){
  localStorage.setItem(LS, JSON.stringify(learned));
  localStorage.setItem(LSW, JSON.stringify(weak));
  updateProgress();
}
function weakCount(){ return D.mistakes.filter(m=>weak[m.id]).length; }
function updateProgress(){
  const total = D.mistakes.length;
  const done = D.mistakes.filter(m=>learned[m.id]).length;
  const wk = weakCount();
  const pct = Math.round(done/total*100);
  document.getElementById('progbar').style.width = pct+"%";
  document.getElementById('progtxt').textContent = `習得 ${done} / ${total} 項目（${pct}%）` + (wk?` ・ ⚠️苦手 ${wk}`:'');
  const qc = document.getElementById('qc-cards'); if(qc) qc.textContent = `${done}/${total} 習得済み`;
  const wb = document.getElementById('weakbtn');
  if(wb){ wb.style.display = wk?'block':'none'; document.getElementById('weakbtn-n').textContent = `${wk}問`; }
}

// HOME
document.getElementById('goal').textContent = "目標: " + D.goal + " / 更新 " + D.updated;
function buildHome(){
  const chips = cats.map(c=>{
    const n = D.mistakes.filter(m=>m.cat===c).length;
    return `<div class="chip">${c} <b>${n}</b></div>`;
  }).join('') + `<div class="chip">合計ミス <b>${D.mistakes.length}</b></div>`;
  document.getElementById('homechips').innerHTML = chips;
}

// CARDS
let curCat = "すべて";
function buildFilter(){
  const wk = weakCount();
  const opts = ["すべて",...cats, ...(wk?["⚠️苦手"]:[])];
  document.getElementById('catfilter').innerHTML = opts.map(c=>
    `<button class="${c===curCat?'on':''}" onclick="setCat('${c}')">${c}${c==='⚠️苦手'?`(${wk})`:''}</button>`).join('');
}
function setCat(c){ curCat=c; buildFilter(); buildCards(); }
function buildCards(){
  const list = D.mistakes.filter(m=> curCat==="すべて" ? true : curCat==="⚠️苦手" ? weak[m.id] : m.cat===curCat );
  document.getElementById('cardlist').innerHTML = list.map(m=>`
    <div class="mcard ${learned[m.id]?'open':''}" id="c-${m.id}" onclick="toggleCard('${m.id}')">
      <span class="catlab" style="color:${catColor[m.cat]}">${m.cat}</span>
      <div class="mid">${m.id} ${learned[m.id]?'<span style="color:var(--good)">✓ 習得</span>':''} ${weak[m.id]?'<span style="color:var(--bad)">⚠️ 苦手</span>':''}</div>
      ${m.topic?`<div class="ctopic">📍 ${esc(m.topic)}</div>`:''}
      ${m.ctx?`<div class="cctx">${esc(m.ctx)}</div>`:''}
      <div class="bad">❌ ${esc(m.wrong)}</div>
      <div class="arrow">↓</div>
      <div class="good">✅ ${esc(m.right)}</div>
      <div class="detail">
        <div class="why"><b>💡 なぜ:</b> ${esc(m.why)}</div>
        <div class="ex"><b>📝 例文:</b> ${esc(m.ex)}</div>
        <div class="tap">タップで開閉 ・ <a href="#" style="color:var(--brand)" onclick="markLearned('${m.id}',event)">${learned[m.id]?'習得を取消':'習得済みにする'}</a></div>
      </div>
    </div>`).join('');
}
function toggleCard(id){ document.getElementById('c-'+id).classList.toggle('open'); }
function markLearned(id,e){ e.preventDefault(); e.stopPropagation(); learned[id]=!learned[id]; if(learned[id]) delete weak[id]; save(); buildFilter(); buildCards(); }

// QUIZ
let quizOrder=[], qi=0, quizMode='all';
function startQuiz(weakOnly){
  if(weakOnly){
    const pool = D.mistakes.filter(m=>weak[m.id]);
    if(pool.length===0){ alert('⚠️苦手マークはまだありません。まず通常クイズで「まだ不安」を押すと、ここに苦手が溜まっていきます。'); return; }
    quizOrder = pool.sort(()=>Math.random()-0.5); quizMode='weak';
  } else {
    quizOrder = [...D.mistakes].sort(()=>Math.random()-0.5); quizMode='all';
  }
  qi=0; renderQuiz(); go('quiz');
}
function renderQuiz(){
  const w=document.getElementById('quizwrap');
  if(qi>=quizOrder.length){
    const done = D.mistakes.filter(m=>learned[m.id]).length;
    const wk = weakCount();
    const weakBtn = wk?`<button class="bhard" onclick="startQuiz(true)">⚠️苦手だけ復習（${wk}問）</button>`:'';
    w.innerHTML=`<div class="done"><h2>お疲れさま！🎉</h2><p>全${quizOrder.length}問チェック完了。<br>習得済み ${done}/${D.mistakes.length} 項目 ・ ⚠️苦手 ${wk}問。</p>
      <div class="qbtns"><button class="breveal" onclick="startQuiz()">全問もう一周</button>${weakBtn}</div>
      <div class="qbtns"><button class="bhard" onclick="go('home')" style="border:1px solid var(--line)!important;color:var(--sub)">ホームへ</button></div></div>`;
    return;
  }
  const m=quizOrder[qi];
  w.innerHTML=`
    <div class="qcount">${quizMode==='weak'?'⚠️苦手モード ':''}${qi+1} / ${quizOrder.length}</div>
    <div class="qcard">
      <div class="qcat" style="color:${catColor[m.cat]}">${m.cat} ・ ${m.id}</div>
      ${m.topic?`<div class="qtopic">📍 ${esc(m.topic)}</div>`:''}
      ${m.ctx?`<div class="qctx">${esc(m.ctx)}</div>`:''}
      <div class="qbad">❌ ${esc(m.wrong)}</div>
      <div class="qhint">この状況で正しく言うには？（頭の中で言ってみる）</div>
      <div class="qans" id="qans">
        <div class="qgood">✅ ${esc(m.right)}</div>
        <div class="qwhy"><b>💡</b> ${esc(m.why)}</div>
        <div class="qex"><b>📝</b> ${esc(m.ex)}</div>
      </div>
    </div>
    <div class="qbtns" id="qb1"><button class="breveal" onclick="reveal()">答えを見る 👀</button></div>`;
}
function reveal(){
  document.getElementById('qans').classList.add('show');
  const m=quizOrder[qi];
  document.getElementById('qb1').innerHTML =
    `<button class="bhard" onclick="grade(false)">まだ不安 🔁</button>
     <button class="beasy" onclick="grade(true)">できた ✅</button>`;
}
function grade(ok){
  const m=quizOrder[qi];
  if(ok){ learned[m.id]=true; delete weak[m.id]; }      // できた → 習得、苦手マークを外す
  else { weak[m.id]=true; learned[m.id]=false; }          // まだ不安 → 苦手として保存
  save(); qi++; renderQuiz();
}

// TOP5
function buildTop5(){
  document.getElementById('top5list').innerHTML = D.top5.map(t=>`
    <div class="row5"><span class="rk">${t.rank}</span><span class="t">${esc(t.title)}</span>
      <div class="sym">例: ${esc(t.symptom)}</div>
      <div class="fx">→ ${esc(t.fix)}</div></div>`).join('');
}
// PLAN
function buildPlan(){
  document.getElementById('weeklist').innerHTML = D.week.map(w=>`
    <div class="day"><div class="d">${w.day}</div><div><div class="th">${esc(w.theme)}</div><div class="ts">${esc(w.task)}</div></div></div>`).join('');
  document.getElementById('priolist').innerHTML = D.priority.map(p=>`
    <div class="pr"><h3>${esc(p.tier)} <span class="pd">(${esc(p.desc)})</span></h3><ul>${p.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`).join('');
}
// MODELS（模範解答）
let openModel = {};
function buildModels(){
  document.getElementById('modellist').innerHTML = D.essays.map(e=>`
    <div class="es">
      <h3>${esc(e.title)} <span class="ewords">${esc(e.words||'')}</span></h3>
      <div class="eprompt">🖊 ${esc(e.prompt)}</div>
      <div class="etoggle" onclick="toggleModel('${e.id}')">${openModel[e.id]?'▲ 原文を隠す':'▼ あなたの原文を見る'}</div>
      ${openModel[e.id]?`<div class="eblock eorig"><span class="etag bad">① 原文</span>${esc(e.original)}</div>`:''}
      <div class="eblock enat"><span class="etag good">② 自然な表現</span>${esc(e.natural)}</div>
      ${e.improved?`<div class="eblock eimp"><span class="etag imp">③ 改良版（Band 7+）</span>${esc(e.improved)}</div>`:''}
    </div>`).join('');
}
function toggleModel(id){ openModel[id]=!openModel[id]; buildModels(); }

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.v===v));
  // クイズ画面に来たら、まだ始まっていなければ自動でスタート
  if(v==='quiz' && document.getElementById('quizwrap').children.length===0){ startQuiz(); }
  // カード画面は最新の習得/苦手を反映して再描画
  if(v==='cards'){ if(curCat==='⚠️苦手' && weakCount()===0) curCat='すべて'; buildFilter(); buildCards(); }
  window.scrollTo(0,0);
}

buildHome(); buildFilter(); buildCards(); buildTop5(); buildPlan(); buildModels(); updateProgress();
</script>
</body>
</html>
